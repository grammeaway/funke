name: Release
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            linker: gcc-aarch64-linux-gnu
          - target: riscv64gc-unknown-linux-gnu
            os: ubuntu-latest
            linker: gcc-riscv64-linux-gnu
          - target: x86_64-pc-windows-gnu
            os: ubuntu-latest
            linker: gcc-mingw-w64-x86-64
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cross-compilation linker
        if: matrix.linker != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.linker }}
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_RISCV64GC_UNKNOWN_LINUX_GNU_LINKER: riscv64-linux-gnu-gcc
          CARGO_TARGET_X86_64_PC_WINDOWS_GNU_LINKER: x86_64-w64-mingw32-gcc
      - name: Package
        shell: bash
        run: |
          NAME="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].name')"
          EXT=""
          if [[ "${{ matrix.target }}" == *windows* ]]; then EXT=".exe"; fi
          OUTPUT_DIR="${NAME}-${{ matrix.target }}"
          mkdir -p "$OUTPUT_DIR"
          cp "target/${{ matrix.target }}/release/${NAME}${EXT}" "$OUTPUT_DIR/"
          cp LICENSE README.md "$OUTPUT_DIR/"
          tar -czvf "${OUTPUT_DIR}.tar.gz" "$OUTPUT_DIR"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: "*.tar.gz"
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Generate SHA256 checksums
        run: |
          cd dist
          find . -name '*.tar.gz' -exec sha256sum {} \; > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          overwrite: true
          files: |
            dist/**/*.tar.gz
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
